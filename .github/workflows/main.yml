name: Auto Server

on:
  workflow_dispatch:
    inputs:
      server_type:
        description: server type
        required: true
        default: python
        type: choice
        options:
          - python
          - php
          - nodejs

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Server
        env:
          SERVER_TYPE: ${{ github.event.inputs.server_type }}
        run: |
          pip install -q flask
          python apps/app.py &
          echo PORT=5000 >> $GITHUB_ENV
          sleep 3

      - name: Start Tunnel
        run: |
          cloudflared tunnel --url http://localhost:5000 --no-autoupdate 2>&1 | tee /tmp/cf.log &
          for i in $(seq 1 30); do
            URL=$(grep -o "https://[a-z0-9-]*.trycloudflare.com" /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo "================================"
              echo "  URL: $URL"
              echo "================================"
              break
            fi
            sleep 2
          done

      - name: Keep Alive
        run: sleep 20700
