name: Auto Server

on:
  workflow_dispatch:
    inputs:
      server_type:
        description: server type
        required: true
        default: python
        type: choice
        options:
          - python
          - php
          - nodejs
          - telegram-bot
  schedule:
    - cron: "0 */5 * * *"

permissions:
  contents: write

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Server
        env:
          SERVER_TYPE: ${{ github.event.inputs.server_type || 'python' }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          TYPE=${SERVER_TYPE:-python}
          echo "Starting: $TYPE"

          if [ "$TYPE" = "python" ]; then
            pip install -q flask
            python apps/app.py &
            PORT=5000

          elif [ "$TYPE" = "telegram-bot" ]; then
            pip install -q python-telegram-bot
            python apps/bot.py &
            PORT=0
          fi

          echo "PORT=$PORT" >> $GITHUB_ENV
          sleep 3

      - name: Start Tunnel and Save URL
        if: env.PORT != "0"
        run: |
          cloudflared tunnel --url http://localhost:${{ env.PORT }} --no-autoupdate 2>&1 | tee /tmp/cf.log &
          for i in $(seq 1 30); do
            URL=$(grep -o "https://[a-z0-9-]*.trycloudflare.com" /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo "================================"
              echo "  URL: $URL"
              echo "================================"
              echo "$URL" > server_url.txt
              git config user.email "actions@github.com"
              git config user.name "GitHub Actions"
              git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
              git add server_url.txt
              git commit -m "url: update"
              git push
              break
            fi
            sleep 2
          done

      - name: Keep Alive
        run: sleep 20700
