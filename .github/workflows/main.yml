name: Auto Server

on:
  workflow_dispatch:
    inputs:
      server_type:
        description: server type
        required: true
        default: python
        type: choice
        options:
          - python
          - php
          - nodejs

permissions:
  contents: write

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Server
        run: |
          pip install -q flask
          python apps/app.py &
          sleep 3

      - name: Start Tunnel and Save URL
        run: |
          cloudflared tunnel --url http://localhost:5000 --no-autoupdate 2>&1 | tee /tmp/cf.log &
          for i in $(seq 1 30); do
            URL=$(grep -o "https://[a-z0-9-]*.trycloudflare.com" /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo "================================"
              echo "  URL: $URL"
              echo "================================"
              echo "$URL" > server_url.txt
              git config user.email "actions@github.com"
              git config user.name "GitHub Actions"
              git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
              git add server_url.txt
              git commit -m "url: update"
              git push
              break
            fi
            sleep 2
          done

      - name: Keep Alive
        run: sleep 20700
